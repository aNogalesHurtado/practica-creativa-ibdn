version: '3.8'

services:

  mongo:
    image: mongo:7.0.17
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "DESCRIBE KEYSPACES"]
      interval: 30s
      timeout: 10s
      retries: 10

  kafka:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 30s
      retries: 15
      start_period: 60s

  spark-master:
    image: apache/spark:4.1.0
    container_name: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MODE=master
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  spark-worker:
    image: apache/spark:4.1.0
    container_name: spark-worker
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g

  kafka-init:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic flight-delay-ml-request &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic flight-delay-ml-response &&
        echo 'Topics created'
      "
    restart: "no"

  spark-predictor:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-predictor
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      mongo:
        condition: service_started
      spark-master:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MONGO_HOST=mongo
      - CASSANDRA_HOST=cassandra
      - PROJECT_HOME=/app
      - SPARK_MASTER=spark://spark-master:7077

  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: flask
    ports:
      - "5001:5001"
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      mongo:
        condition: service_started
    environment:
      - PROJECT_HOME=/app
      - CASSANDRA_HOST=cassandra
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MONGO_HOST=mongo

volumes:
  mongo_data:
  minio_data:
  cassandra_data:
