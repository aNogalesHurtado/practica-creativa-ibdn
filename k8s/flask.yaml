apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask
        image: gcr.io/practica-creativa-ibdn-496114/flask:latest
        env:
        - name: PROJECT_HOME
          value: "/app"
        - name: CASSANDRA_HOST
          value: "cassandra"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: MONGO_HOST
          value: "mongo"
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: flask
spec:
  type: LoadBalancer
  selector:
    app: flask
  ports:
  - port: 5001
    targetPort: 5001
